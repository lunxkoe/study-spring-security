services:
  mysql-db:
    image: mysql:8.0
    container_name: springboot-study-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password  # Root 계정 비밀번호
      MYSQL_DATABASE: spring_dev_study_db # 생성될 데이터베이스 이름
      MYSQL_USER: user                    # 사용할 사용자 계정
      MYSQL_PASSWORD: pass                # 사용자 계정 비밀번호
      TZ: Asia/Seoul                      # 타임존 설정
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
