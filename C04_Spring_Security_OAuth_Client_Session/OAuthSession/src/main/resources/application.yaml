spring:
  application:
    name: OAuthSession
  datasource:
    url: jdbc:mysql://localhost:3306/spring_dev_study_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: user
    password: pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  mustache:
    servlet:
      expose-request-attributes: true

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

